<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Brabu's Store | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --surface: rgba(23, 23, 23, 0.88);
        --border: rgba(255, 255, 255, 0.1);
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --primary: #c9a84c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 35%),
          linear-gradient(180deg, #111111 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 32px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        text-align: center;
      }

      .badge {
        display: inline-block;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 48px);
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 28px;
        border-radius: 999px;
        padding: 14px 22px;
        background: var(--primary);
        color: #050505;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-decoration: none;
        text-transform: uppercase;
      }

      img {
        width: 88px;
        height: 88px;
        object-fit: contain;
        margin-bottom: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192x192.png" alt="Brabu's Store" />
      <span class="badge">Modo Offline</span>
      <h1>Sem conexão</h1>
      <p>
        O aplicativo continua instalável e exibe este fallback mínimo quando a navegação falha por ausência de internet.
        Assim que a rede voltar, recarregue a página para retomar a operação normal.
      </p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
